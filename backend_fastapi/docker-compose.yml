version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: e4rth_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: e4rth_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e4rth_user -d e4rth_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://e4rth_user:password@postgres:5432/e4rth_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A workers.celery_app worker -Q etl --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://e4rth_user:password@postgres:5432/e4rth_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    image: busybox
    command: sh -c "while true; do sleep 3600; done"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
    restart: unless-stopped

volumes:
  pgdata:
