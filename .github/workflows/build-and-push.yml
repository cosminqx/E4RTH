name: Build and push backend & worker images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO_NAME_LOWER=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend_fastapi
          file: ./backend_fastapi/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME_LOWER }}-backend:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME_LOWER }}-backend:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend_fastapi
          file: ./backend_fastapi/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME_LOWER }}-worker:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME_LOWER }}-worker:${{ github.sha }}
